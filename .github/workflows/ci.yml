name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build docs
        run: npm run build --workspace=apps/docs

      - name: Build blog
        run: npm run build --workspace=apps/blog

      - name: Check for absolute-root links in blog
        run: |
          if grep -r 'href="/' apps/blog/src/ --include='*.mdx' --include='*.md' --include='*.astro' -l 2>/dev/null; then
            echo "ERROR: absolute-root links found in blog content. Use relative links or /blog-prefixed paths."
            exit 1
          fi

      - name: No raw HTML in authored content
        run: |
          if grep -rn '<[a-z]' apps/docs/src/content/ apps/blog/src/content/ --include='*.mdx' --include='*.md' 2>/dev/null | grep -v '<!--' | grep -v '{/*'; then
            echo "ERROR: raw HTML found in authored content. Use sanctioned components only."
            exit 1
          fi
